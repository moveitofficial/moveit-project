name: Discord Notify

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      - main
      - dev
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send notification to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CONTENT="📌 ${{ github.repository }}\n🔀 PR 알림\n🌿 대상 브랜치: ${{ github.event.pull_request.base.ref }}\n🪴 작업 브랜치: ${{ github.event.pull_request.head.ref }}\n👤 작성자: ${{ github.actor }}\n📝 제목: ${{ github.event.pull_request.title }}\n🔗 ${{ github.event.pull_request.html_url }}"
          else
            PR_DATA=$(curl -s \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls")

            PR_TITLE=$(echo "$PR_DATA" | jq -r 'try (if type=="array" and length>0 then .[0].title else empty end) catch empty')
            PR_URL=$(echo "$PR_DATA" | jq -r 'try (if type=="array" and length>0 then .[0].html_url else empty end) catch empty')
            PR_NUMBER=$(echo "$PR_DATA" | jq -r 'try (if type=="array" and length>0 then .[0].number else empty end) catch empty')

            if [ -n "$PR_TITLE" ]; then
              CONTENT="📌 ${{ github.repository }}\n🚀 Push 알림\n🌿 브랜치: ${{ github.ref_name }}\n👤 작성자: ${{ github.actor }}\n📝 PR 제목: $PR_TITLE (#$PR_NUMBER)\n🔗 $PR_URL"
            else
              CONTENT="📌 ${{ github.repository }}\n🚀 Push 알림\n🌿 브랜치: ${{ github.ref_name }}\n👤 작성자: ${{ github.actor }}\n📝 커밋: ${{ github.event.head_commit.message }}\n🔗 ${{ github.event.head_commit.url }}"
            fi
          fi

          curl -s -H "Content-Type: application/json" \
            -X POST \
            -d "$(jq -n --arg content "$(printf '%b' "$CONTENT")" '{content: $content}')" \
            "$DISCORD_WEBHOOK_URL"
