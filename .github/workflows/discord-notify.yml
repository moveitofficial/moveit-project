name: Discord Notify

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      - main
      - dev
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send notification to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          PR_TITLE_INPUT: ${{ github.event.pull_request.title }}
          PR_URL_INPUT: ${{ github.event.pull_request.html_url }}
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
          HEAD_COMMIT_URL: ${{ github.event.head_commit.url }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            CONTENT="📌 $REPO\n🔀 PR 알림\n🌿 대상 브랜치: $PR_BASE\n🪴 작업 브랜치: $PR_HEAD\n👤 작성자: $ACTOR\n📝 제목: $PR_TITLE_INPUT\n🔗 $PR_URL_INPUT"
          else
            PR_DATA=$(curl -s \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/commits/$SHA/pulls")

            PR_TITLE=$(echo "$PR_DATA" | jq -r 'try (if type=="array" and length>0 then .[0].title else empty end) catch empty')
            PR_URL=$(echo "$PR_DATA" | jq -r 'try (if type=="array" and length>0 then .[0].html_url else empty end) catch empty')
            PR_NUMBER=$(echo "$PR_DATA" | jq -r 'try (if type=="array" and length>0 then .[0].number else empty end) catch empty')

            if [ -n "$PR_TITLE" ]; then
              CONTENT="📌 $REPO\n🚀 Push 알림\n🌿 브랜치: $REF_NAME\n👤 작성자: $ACTOR\n📝 PR 제목: $PR_TITLE (#$PR_NUMBER)\n🔗 $PR_URL"
            else
              COMMIT_FIRST_LINE=$(printf '%s' "$HEAD_COMMIT_MSG" | head -n 1)
              CONTENT="📌 $REPO\n🚀 Push 알림\n🌿 브랜치: $REF_NAME\n👤 작성자: $ACTOR\n📝 커밋: $COMMIT_FIRST_LINE\n🔗 $HEAD_COMMIT_URL"
            fi
          fi

          curl -s -H "Content-Type: application/json" \
            -X POST \
            -d "$(jq -n --arg content "$(printf '%b' "$CONTENT")" '{content: $content}')" \
            "$DISCORD_WEBHOOK_URL"
