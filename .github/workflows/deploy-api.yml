name: Deploy API to EC2

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          command_timeout: 15m
          script: |
            set -e
            export CI=true
            
            echo "📦 [1/5] 코드 업데이트"
            cd /home/ubuntu/moveit
            git pull origin main
            
            echo "📦 [2/5] 의존성 설치"
            rm -rf node_modules
            pnpm install --frozen-lockfile
            
            echo "📦 [3/5] Prisma 클라이언트 생성"
            pnpm --filter api run prisma:generate
            
            echo "📦 [4/5] 빌드"
            pnpm --filter api build
            
            echo "📦 [5/5] pm2 재시작"
            pm2 restart moveit-api --update-env
            pm2 save
            
            echo "✅ 배포 완료!"
            pm2 status